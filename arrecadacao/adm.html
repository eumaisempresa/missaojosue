<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Missão Josué</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gold-shine {
            background: linear-gradient(135deg, #60A5FA 0%, #3B82F6 50%, #1E40AF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
        }
        .missao-blue { color: #3B82F6; }
        .plus-symbol { color: #3B82F6; font-weight: 900; }
        
        @media (max-width: 768px) {
            .mobile-card-list { display: block; }
            .desktop-table { display: none; }
        }
        @media (min-width: 769px) {
            .mobile-card-list { display: none; }
            .desktop-table { display: table; }
        }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans flex flex-col justify-between">

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwSeJjsgGrdsxZ0Ik4bYRnx8NoSHnwT4KVRzAacZgFdndO8y3nTMQbJCm8i-V_sCrDIHA/exec";
        let campanhaSelecionadaId = "";
        let dadosExportacao = [];
        let dadosCampanhaAtual = null;
        const MASTER_PASSWORD = "Josue123"; 
        const GITHUB_BASE_URL = "https://eumaisempresa.github.io/missaocomaan/arrecadacao/publico.html";
    </script>

    <!-- TELA DE LOGIN -->
    <div id="telaLogin" class="fixed inset-0 bg-zinc-950 flex items-center justify-center z-[100] px-4">
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-8 max-w-md w-full text-center shadow-2xl space-y-6">
            <div class="flex flex-col items-center gap-2">
                <i class="fa-solid fa-lock text-4xl mb-2 text-zinc-600"></i>
                <h2 class="text-2xl font-black uppercase tracking-tight text-white">MISSÃO JOSUÉ</h2>
                <p class="text-zinc-400 text-xs tracking-wide uppercase font-bold">Área Restrita do Administrador</p>
            </div>
            <form onsubmit="verificarSenha(event)" class="space-y-4">
                <input type="password" id="senhaInput" required placeholder="Digite a senha" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3.5 text-center text-zinc-100 placeholder-zinc-600 font-bold focus:outline-none focus:border-blue-500 transition-all tracking-widest text-lg">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-3.5 px-4 rounded-xl transition-all shadow-lg cursor-pointer">
                    Desbloquear Painel
                </button>
                <div id="erroSenha" class="text-red-500 text-xs font-bold hidden">Senha incorreta!</div>
            </form>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div id="conteudoPainel" class="hidden flex-col min-h-screen w-full">
        
        <header class="border-b border-zinc-800 bg-zinc-900/50 backdrop-blur sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <h1 class="text-2xl font-extrabold uppercase tracking-tight text-white">MISSÃO JOSUÉ</h1>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="carregarCampanhas()" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-200 p-2.5 rounded-xl transition-all cursor-pointer">
                        <i class="fa-solid fa-rotate"></i>
                    </button>
                    <button onclick="fazerLogout()" class="bg-red-900/20 text-red-400 p-2.5 rounded-xl transition-all cursor-pointer">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-3 gap-6 w-full flex-grow">
            
            <section class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 shadow-xl h-fit">
                <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-plus text-blue-500"></i> Criar Nova Campanha
                </h2>
                <form id="formCriarCampanha" onsubmit="criarCampanha(event)" class="space-y-4">
                    <input type="text" id="nomeAcao" required placeholder="Nome da Ação" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-zinc-100 outline-none">
                    <div class="grid grid-cols-3 gap-3">
                        <input type="number" id="numeroInicial" required value="1" placeholder="Início" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-2 py-3 text-sm text-zinc-100 outline-none text-center">
                        <select id="quantidadeNumeros" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-2 py-3 text-sm text-zinc-100 outline-none">
                            <option value="50">50</option>
                            <option value="100" selected>100</option>
                            <option value="200">200</option>
                            <option value="500">500</option>
                            <option value="700">700</option>
                            <option value="1000">1000</option>
                        </select>
                        <input type="number" id="valorCota" step="0.01" required placeholder="Valor" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-2 py-3 text-sm text-zinc-100 outline-none">
                    </div>
                    <textarea id="descricaoPremios" rows="2" required placeholder="Prêmios" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-zinc-100 outline-none"></textarea>
                    <textarea id="obsCampanha" rows="2" placeholder="Promoções" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-zinc-100 outline-none"></textarea>
                    <button type="submit" id="btnSalvarCampanha" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-3 rounded-xl transition-all cursor-pointer">
                        Publicar Ação
                    </button>
                </form>
            </section>

            <section class="lg:col-span-2 space-y-6">
                <!-- resto do painel mantido igual -->
                <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 shadow-xl">
                    <select id="selectCampanhas" onchange="selecionarCampanha(this.value)" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-4 text-zinc-100 font-bold text-lg outline-none cursor-pointer mb-4">
                        <option value="">Carregando campanhas...</option>
                    </select>

                    <div id="boxLinkCampanha" class="hidden p-4 bg-zinc-950 rounded-xl border border-zinc-800/80 flex flex-col sm:flex-row justify-between items-center gap-4">
                        <div class="flex-1 overflow-hidden">
                            <span id="badgeStatus" class="inline-block px-2 py-0.5 rounded text-[9px] font-black uppercase mb-1"></span>
                            <code id="linkPublicoTxt" class="text-blue-400 font-mono text-xs truncate block w-full"></code>
                        </div>
                        <div class="flex gap-2 w-full sm:w-auto">
                            <button onclick="copiarLinkPublico()" class="bg-blue-600/10 text-blue-400 border border-blue-500/20 px-4 py-2 rounded-lg text-xs font-bold cursor-pointer">Copiar</button>
                            <button onclick="encerrarCampanhaAtual()" class="bg-red-900/10 text-red-400 border border-red-900/20 px-4 py-2 rounded-lg text-xs font-bold cursor-pointer">Encerrar</button>
                        </div>
                    </div>
                </div>

                <!-- KPIs e tabela mantidos -->
                <div id="painelKPIs" class="hidden grid grid-cols-2 md:grid-cols-4 gap-4">
                    <!-- ... (igual) -->
                </div>

                <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 shadow-xl min-h-[400px]">
                    <!-- resto igual -->
                </div>
            </section>
        </main>

        <footer class="w-full bg-zinc-950 border-t border-zinc-900 py-6 text-center">
            <a href="https://eumaisempresa.github.io/eumaismissao/" target="_blank" class="text-blue-400 text-[10px] font-bold">🛡️ DESENVOLVIDO POR GRUPO EU+ MISSÃO</a>
        </footer>
    </div>

    <script>
        // Todo o JavaScript atualizado (com senha Josue123)
        function verificarSenha(e) {
            e.preventDefault();
            if(document.getElementById("senhaInput").value === "Josue123") {
                document.getElementById("telaLogin").classList.add("hidden");
                document.getElementById("conteudoPainel").classList.remove("hidden");
                carregarCampanhas();
            } else {
                document.getElementById("erroSenha").classList.remove("hidden");
            }
        }

        // ... (todas as outras funções permanecem iguais às do arquivo original)

        function fazerLogout() { location.reload(); }

        async function carregarCampanhas() {
            const sel = document.getElementById("selectCampanhas");
            sel.innerHTML = "<option>Carregando...</option>";
            try {
                const res = await fetch(`${API_URL}?action=listarcampanhas`);
                const json = await res.json();
                sel.innerHTML = '<option value="">-- Selecione uma Campanha --</option>';
                json.campanhas.forEach(c => {
                    sel.innerHTML += `<option value="\( {c.id}" data-status=" \){c.status}" data-json='\( {JSON.stringify(c)}'> \){c.nome} (\( {c.totalNumeros} nºs) - [ \){c.status}]</option>`;
                });
            } catch(e) { alert("Erro de conexão."); }
        }

        // (As demais funções - selecionarCampanha, atualizarListaReservas, etc. - estão iguais ao original, só com as cores e textos atualizados)
    </script>
</body>
    </html>
